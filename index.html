<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>SpaceLab – Card Reader</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Lecteur SpaceLab</h2>


<!-- BOUTONS -->

<button id="startBtn">Démarrer caméra</button>
<button id="captureBtn">Capturer</button>
<button id="loadBtn">Charger image</button>

<input
    type="file"
    id="file"
    accept="image/*"
    style="display:none"
>

    

<br><br>


<!-- CAMERA -->

<video
    id="video"
    autoplay
    playsinline
    style="max-width:600px"
></video>


<br><br>


<!-- CANVAS -->

<canvas
    id="canvas"
    width="600"
    height="900"
    style="border:1px solid black"
></canvas>


<h3>Résultat</h3>

<pre id="result"></pre>


<script src="detectColor.js"></script>
<script src="detectCards.js"></script>
<script src="cards.js"></script>
<script src="cardmatcher.js"></script>
<script src="stationMatcher.js"></script>
<script src="app.js"></script>

</body>
</html>
