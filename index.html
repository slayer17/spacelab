<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>SpaceLab – Card Reader</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Lecteur SpaceLab</h2>


<!-- =======================
     MODE
======================= -->

<button id="boardBtn">Mode BOARD</button>
<button id="cardsBtn">Mode CARDS</button>

<br><br>


<!-- =======================
     CAMERA
======================= -->

<button id="startBtn">Démarrer caméra</button>
<button id="captureBtn">Capturer</button>

<br><br>


<!-- =======================
     LOAD IMAGE
======================= -->

<button id="loadBtn">Charger image</button>

<input
    type="file"
    id="file"
    accept="image/*"
    style="display:none"
>


<br><br>


<!-- =======================
     VIDEO
======================= -->

<video
    id="video"
    autoplay
    playsinline
    style="max-width:600px"
></video>


<br><br>


<!-- =======================
     CANVAS
======================= -->

<canvas
    id="canvas"
    width="600"
    height="900"
    style="border:1px solid black"
>


<h3>Résultat</h3>

<pre id="result"></pre>
</canvas>

<!-- =======================
     SCRIPTS
======================= -->

<!-- <script src="detectCards.js"></script> -->
<script src="cards.js"></script>
<script src="script.js"></script>

<!-- <script src="app.js"></script> -->


</body>
</html>
